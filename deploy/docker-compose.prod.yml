# Production/staging stack for a small VPS.
# Файл deploy/.env создаётся job deploy-staging из GitHub Actions secrets.
# HTTPS и статика фронта — nginx на хосте (конфиг вручную на сервере, не в репо).

name: skinemsya

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-skinemsya}
      POSTGRES_USER: ${POSTGRES_USER:-skinemsya}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-skinemsya} -d ${POSTGRES_DB:-skinemsya}']
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  minio:
    # Старые VPS без x86-64-v2: тег -cpuv1 (latest падает с glibc error).
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z-cpuv1
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:?set S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:?set S3_SECRET_KEY}
    volumes:
      - minio_data:/data
    deploy:
      resources:
        limits:
          memory: 192M

  backend:
    image: skinemsya-backend:${APP_VERSION:-latest}
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-skinemsya}
      DB_USER: ${POSTGRES_USER:-skinemsya}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      SERVER_PORT: 8080
      FILE_STORAGE_TYPE: s3
      FILE_STORAGE_PATH: /data/files
      S3_ENDPOINT: http://minio:9000
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-skinemsya-files}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:?set S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY:?set S3_SECRET_KEY}
      TELEGRAM_BOT_POLLING_ENABLED: ${TELEGRAM_BOT_POLLING_ENABLED:-true}
    ports:
      - '127.0.0.1:8080:8080'
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  postgres_data:
  minio_data:
