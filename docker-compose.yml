services:
  postgres:
    image: postgres:16-alpine
    container_name: skinemsya-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: skinemsya
      POSTGRES_USER: skinemsya
      POSTGRES_PASSWORD: skinemsya
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skinemsya -d skinemsya"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
