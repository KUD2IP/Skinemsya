services:
  postgres:
    image: postgres:16-alpine
    container_name: skinemsya-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: skinemsya
      POSTGRES_USER: skinemsya
      POSTGRES_PASSWORD: skinemsya
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skinemsya -d skinemsya"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: skinemsya-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: skinemsya
      MINIO_ROOT_PASSWORD: skinemsya
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  minio_data:
