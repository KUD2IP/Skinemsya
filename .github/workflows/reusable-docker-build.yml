name: Reusable Docker build

on:
  workflow_call:
    inputs:
      version:
        description: Semver application version
        required: true
        type: string
      extra_tags:
        description: Comma-separated extra Docker tags
        required: false
        type: string
        default: ''
      push:
        description: Push image to GHCR
        required: false
        type: boolean
        default: true
    outputs:
      image:
        description: Full image reference with primary tag
        value: ${{ jobs.build.outputs.image }}
      digest:
        description: Image digest
        value: ${{ jobs.build.outputs.digest }}

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build and push
    runs-on: ubuntu-latest
    timeout-minutes: 25
    outputs:
      image: ${{ steps.tags.outputs.primary }}
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Build tag list
        id: tags
        shell: bash
        env:
          VERSION: ${{ inputs.version }}
          EXTRA_TAGS: ${{ inputs.extra_tags }}
        run: |
          set -euo pipefail
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          IMAGE="ghcr.io/${OWNER}/skinemsya-backend"
          TAG_LIST=()
          TAG_LIST+=("${IMAGE}:${VERSION}")
          if [ -n "${EXTRA_TAGS}" ]; then
            IFS=',' read -ra EXTRAS <<< "${EXTRA_TAGS}"
            for tag in "${EXTRAS[@]}"; do
              tag="$(echo "$tag" | xargs)"
              [ -n "$tag" ] && TAG_LIST+=("${IMAGE}:${tag}")
            done
          fi
          printf -v JOINED '%s,' "${TAG_LIST[@]}"
          echo "list=${JOINED%,}" >> "$GITHUB_OUTPUT"
          echo "primary=${IMAGE}:${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: inputs.push
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ inputs.push }}
          tags: ${{ steps.tags.outputs.list }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy scan
        if: inputs.push
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ steps.tags.outputs.primary }}
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
          ignore-unfixed: true
