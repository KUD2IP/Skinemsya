# CI/CD backend: тесты, сборка Docker-образа, деплой на staging VPS.
# Инструкция по настройке: docs/deployment/staging-server.md

name: Backend CI/CD

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      run_integration_tests:
        description: Запустить integration-тесты (Testcontainers)
        type: boolean
        default: false
      deploy_staging:
        description: Задеплоить на staging после сборки
        type: boolean
        default: false

concurrency:
  group: backend-${{ github.ref }}
  cancel-in-progress: true

env:
  DEPLOY_PATH: /opt/skinemsya
  MAVEN_OPTS: >-
    -Dhttps.protocols=TLSv1.2
    -Dorg.slf4j.simpleLogger.showDateTime=true
    -Djava.awt.headless=true
  MAVEN_CLI_OPTS: >-
    --batch-mode
    --errors
    --fail-at-end
    --show-version
    --no-transfer-progress

jobs:
  test-unit:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run unit tests
        run: >
          mvn $MAVEN_CLI_OPTS -pl skinemsya_parent/app -am
          -Dtest='!*IntegrationTest,!SkinemsyaApplicationTest,!LiquibaseMigrationTest'
          -Dsurefire.failIfNoSpecifiedTests=false
          -DfailIfNoTests=false
          test

  test-integration:
    name: Integration tests
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.run_integration_tests
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run integration tests
        run: mvn $MAVEN_CLI_OPTS -pl skinemsya_parent/app -am verify

  build-image:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: test-unit
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    outputs:
      app_version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: echo "version=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build image
        run: docker build -t skinemsya-backend:${{ steps.meta.outputs.version }} .

      - name: Save image artifact
        run: docker save "skinemsya-backend:${{ steps.meta.outputs.version }}" | gzip > skinemsya-backend.tar.gz

      - uses: actions/upload-artifact@v4
        with:
          name: skinemsya-backend-image
          path: skinemsya-backend.tar.gz
          retention-days: 3

  deploy-staging:
    name: Deploy to staging
    runs-on: ubuntu-latest
    needs: build-image
    if: github.event_name == 'workflow_dispatch' && inputs.deploy_staging
    environment:
      name: staging
      url: https://skinemsya-vse.ru
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: skinemsya-backend-image

      - name: Prepare deploy .env
        env:
          STAGING_ENV: ${{ secrets.STAGING_ENV }}
          STAGING_ENV_B64: ${{ secrets.STAGING_ENV_B64 }}
        run: |
          umask 077
          if [ -n "${STAGING_ENV:-}" ]; then
            printf '%s\n' "$STAGING_ENV" > deploy/.env
          elif [ -n "${STAGING_ENV_B64:-}" ]; then
            echo "$STAGING_ENV_B64" | base64 -d > deploy/.env
          else
            echo "Add secret STAGING_ENV (multiline) or STAGING_ENV_B64 in GitHub repository settings." >&2
            exit 1
          fi
          echo "APP_VERSION=${{ needs.build-image.outputs.app_version }}" >> deploy/.env
          chmod 600 deploy/.env

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          STAGING_HOST: ${{ secrets.STAGING_HOST }}
          STAGING_SSH_PORT: ${{ secrets.STAGING_SSH_PORT }}
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          if ! ssh-keygen -y -f ~/.ssh/deploy_key >/dev/null 2>&1; then
            echo "SSH_PRIVATE_KEY secret is invalid. Paste the full private key file, including BEGIN/END lines." >&2
            exit 1
          fi
          if [ -n "${SSH_KNOWN_HOSTS:-}" ]; then
            printf '%s\n' "$SSH_KNOWN_HOSTS" >> ~/.ssh/known_hosts
          else
            ssh-keyscan -p "${STAGING_SSH_PORT:-22}" "$STAGING_HOST" >> ~/.ssh/known_hosts
          fi
          chmod 644 ~/.ssh/known_hosts

      - name: Sync deploy files
        env:
          STAGING_HOST: ${{ secrets.STAGING_HOST }}
          STAGING_USER: ${{ secrets.STAGING_USER }}
          STAGING_SSH_PORT: ${{ secrets.STAGING_SSH_PORT }}
        run: |
          SSH_PORT="${STAGING_SSH_PORT:-22}"
          SSH_OPTS="-i ~/.ssh/deploy_key -o IdentitiesOnly=yes -o BatchMode=yes -p ${SSH_PORT}"
          SCP_OPTS="-i ~/.ssh/deploy_key -o IdentitiesOnly=yes -o BatchMode=yes -P ${SSH_PORT}"
          ssh $SSH_OPTS "${STAGING_USER}@${STAGING_HOST}" "mkdir -p ${DEPLOY_PATH}/deploy"
          rsync -avz -e "ssh $SSH_OPTS" deploy/ "${STAGING_USER}@${STAGING_HOST}:${DEPLOY_PATH}/deploy/"
          scp $SCP_OPTS skinemsya-backend.tar.gz "${STAGING_USER}@${STAGING_HOST}:${DEPLOY_PATH}/"

      - name: Load image and restart stack
        env:
          STAGING_HOST: ${{ secrets.STAGING_HOST }}
          STAGING_USER: ${{ secrets.STAGING_USER }}
          STAGING_SSH_PORT: ${{ secrets.STAGING_SSH_PORT }}
          APP_VERSION: ${{ needs.build-image.outputs.app_version }}
        run: |
          SSH_PORT="${STAGING_SSH_PORT:-22}"
          SSH_OPTS="-i ~/.ssh/deploy_key -o IdentitiesOnly=yes -o BatchMode=yes -p ${SSH_PORT}"
          ssh $SSH_OPTS "${STAGING_USER}@${STAGING_HOST}" <<EOSSH
          set -euo pipefail
          chmod 600 "${DEPLOY_PATH}/deploy/.env"
          cd "${DEPLOY_PATH}"
          gunzip -c skinemsya-backend.tar.gz | docker load
          cd deploy
          APP_VERSION="${APP_VERSION}" docker compose -f docker-compose.prod.yml up -d --remove-orphans
          docker image prune -f
          EOSSH
