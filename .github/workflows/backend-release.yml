name: Backend Release

on:
  push:
    branches: ['release/**']

concurrency:
  group: backend-release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write

jobs:
  resolve-version:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      sha_tag: ${{ steps.version.outputs.sha_tag }}
    steps:
      - name: Extract semver from branch
        id: version
        run: |
          set -euo pipefail
          branch="${GITHUB_REF_NAME}"
          version="${branch#release/}"
          if ! [[ "${version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.]+)?$ ]]; then
            echo "Release branch must be release/X.Y.Z, got: ${branch}" >&2
            exit 1
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "sha_tag=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

  verify:
    name: Maven verify
    uses: ./.github/workflows/reusable-maven-ci.yml
    with:
      run_integration: true
      upload_jar: false

  build:
    name: Build and push RC image
    needs: [resolve-version, verify]
    uses: ./.github/workflows/reusable-docker-build.yml
    with:
      version: ${{ needs.resolve-version.outputs.version }}
      extra_tags: ${{ needs.resolve-version.outputs.version }}-rc,${{ needs.resolve-version.outputs.sha_tag }}
      push: true
    secrets: inherit

  draft-release:
    name: Draft GitHub Release
    needs: [resolve-version, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.resolve-version.outputs.version }}-rc
          name: v${{ needs.resolve-version.outputs.version }}-rc
          draft: true
          prerelease: true
          generate_release_notes: true
          body: |
            Release candidate for **v${{ needs.resolve-version.outputs.version }}**.

            Docker image: `${{ needs.build.outputs.image }}`
            Digest: `${{ needs.build.outputs.digest }}`

            Tags: `${{ needs.resolve-version.outputs.version }}-rc`, `${{ needs.resolve-version.outputs.sha_tag }}`
