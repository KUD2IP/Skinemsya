name: Reusable Maven CI

on:
  workflow_call:
    inputs:
      run_integration:
        description: Run integration tests
        required: false
        type: boolean
        default: true
      upload_jar:
        description: Upload JAR artifact
        required: false
        type: boolean
        default: false

jobs:
  verify:
    name: Maven verify
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - uses: ./.github/actions/maven-verify
        with:
          run_integration: ${{ inputs.run_integration }}
          upload_jar: ${{ inputs.upload_jar }}
