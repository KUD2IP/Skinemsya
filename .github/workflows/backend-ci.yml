name: Backend CI

on:
  pull_request:
    branches: [develop, master, 'release/**', 'hotfix/**']

concurrency:
  group: backend-ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: Verify
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - uses: ./.github/actions/maven-verify
        with:
          run_integration: 'true'
          upload_jar: 'true'
