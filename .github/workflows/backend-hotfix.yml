name: Backend Hotfix

on:
  push:
    branches: ['hotfix/**']
  workflow_dispatch:
    inputs:
      deploy_production:
        description: Emergency deploy hotfix image to production
        type: boolean
        default: false

concurrency:
  group: backend-hotfix-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  resolve-version:
    name: Resolve hotfix version
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.deploy_production)
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      sha_tag: ${{ steps.version.outputs.sha_tag }}
    steps:
      - name: Extract version
        id: version
        run: |
          set -euo pipefail
          branch="${GITHUB_REF_NAME}"
          base="${branch#hotfix/}"
          if [[ "${base}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            version="${base}"
          else
            version="${base}-hotfix"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "sha_tag=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

  verify:
    name: Verify (push / dispatch)
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.deploy_production)
    uses: ./.github/workflows/reusable-maven-ci.yml
    with:
      run_integration: true
      upload_jar: false

  build:
    name: Build hotfix image
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.deploy_production)
    needs: [resolve-version, verify]
    uses: ./.github/workflows/reusable-docker-build.yml
    with:
      version: ${{ needs.resolve-version.outputs.version }}
      extra_tags: ${{ needs.resolve-version.outputs.version }}-hotfix,${{ needs.resolve-version.outputs.sha_tag }}
      push: true
    secrets: inherit

  emergency-deploy:
    name: Emergency production deploy
    if: github.event_name == 'workflow_dispatch' && inputs.deploy_production
    needs: [resolve-version, build]
    environment: production
    uses: ./.github/workflows/reusable-deploy-backend.yml
    with:
      version: ${{ needs.resolve-version.outputs.version }}
      health_url: https://skinemsya-vse.ru/actuator/health
    secrets: inherit
