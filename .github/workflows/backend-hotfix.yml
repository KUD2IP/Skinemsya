name: Backend Hotfix

on:
  push:
    branches: ['hotfix/**']
  workflow_dispatch:
    inputs:
      deploy_production:
        description: Emergency deploy hotfix image to production
        type: boolean
        default: false

concurrency:
  group: backend-hotfix-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  resolve-version:
    name: Resolve hotfix version
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.deploy_production)
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      sha_tag: ${{ steps.version.outputs.sha_tag }}
    steps:
      - name: Extract version
        id: version
        run: |
          set -euo pipefail
          branch="${GITHUB_REF_NAME}"
          base="${branch#hotfix/}"
          if [[ "${base}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            version="${base}"
          else
            version="${base}-hotfix"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "sha_tag=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

  verify:
    name: Verify (push / dispatch)
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.deploy_production)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - uses: ./.github/actions/maven-verify
        with:
          run_integration: 'true'
          upload_jar: 'false'

  build:
    name: Build hotfix image
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.deploy_production)
    needs: [resolve-version, verify]
    runs-on: ubuntu-latest
    timeout-minutes: 25
    outputs:
      image: ${{ steps.build.outputs.image }}
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4
      - name: Build and push
        id: build
        uses: ./.github/actions/docker-build-push
        with:
          version: ${{ needs.resolve-version.outputs.version }}
          extra_tags: ${{ needs.resolve-version.outputs.version }}-hotfix,${{ needs.resolve-version.outputs.sha_tag }}
          push: 'true'

  emergency-deploy:
    name: Emergency production deploy
    if: github.event_name == 'workflow_dispatch' && inputs.deploy_production
    needs: [resolve-version, build]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: production
      url: https://skinemsya-vse.ru
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/deploy-backend
        with:
          version: ${{ needs.resolve-version.outputs.version }}
          health_url: https://skinemsya-vse.ru/actuator/health
          production_env: ${{ secrets.PRODUCTION_ENV }}
          ssh_private_key: ${{ secrets.SSH_PRIVATE_KEY }}
          production_host: ${{ secrets.PRODUCTION_HOST }}
          production_user: ${{ secrets.PRODUCTION_USER }}
          production_ssh_port: ${{ secrets.PRODUCTION_SSH_PORT || '22' }}
          ssh_known_hosts: ${{ secrets.SSH_KNOWN_HOSTS }}
