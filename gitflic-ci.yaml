# CI/CD для staging-деплоя на VPS через GitFlic Runner.
# Документация по настройке сервера: docs/deployment/staging-server.md

stages:
  - test
  - build
  - deploy

variables:
  MAVEN_OPTS: >-
    -Dhttps.protocols=TLSv1.2
    -Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository
    -Dorg.slf4j.simpleLogger.showDateTime=true
    -Djava.awt.headless=true
  MAVEN_CLI_OPTS: >-
    --batch-mode
    --errors
    --fail-at-end
    --show-version
    --no-transfer-progress
  DEPLOY_PATH: /opt/skinemsya
  APP_VERSION: $CI_COMMIT_SHORT_SHA

cache:
  paths:
    - .m2/repository

# Быстрые тесты без Docker (Testcontainers не нужен).
test:unit:
  stage: test
  image: maven:3.9-eclipse-temurin-21
  script:
    - >
      mvn $MAVEN_CLI_OPTS -pl skinemsya_parent/app -am
      -Dtest='!*IntegrationTest,!SkinemsyaApplicationTest,!LiquibaseMigrationTest'
      -DfailIfNoTests=false
      test
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"

# Полный прогон с Testcontainers — вручную, если у runner есть Docker-in-Docker.
test:integration:
  stage: test
  image: maven:3.9-eclipse-temurin-21
  services:
    - docker:24-dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  script:
    - mvn $MAVEN_CLI_OPTS -pl skinemsya_parent/app -am verify
  when: manual
  allow_failure: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"

# Сборка Docker-образа backend (внутри — mvn package).
build:backend-image:
  stage: build
  image: docker:24-cli
  services:
    - docker:24-dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  script:
    - docker build -t skinemsya-backend:$CI_COMMIT_SHORT_SHA .
    - docker save "skinemsya-backend:$CI_COMMIT_SHORT_SHA" | gzip > skinemsya-backend.tar.gz
  artifacts:
    paths:
      - skinemsya-backend.tar.gz
    expire_in: 3 days
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# Деплой backend на staging (фронт — отдельный репозиторий skinemsya_ui).
deploy:staging:
  stage: deploy
  image: alpine:3.20
  needs:
    - job: build:backend-image
  environment:
    name: staging
    url: https://skinemsya-vse.ru
  when: manual
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  before_script:
    - apk add --no-cache openssh-client rsync
    - eval "$(ssh-agent -s)"
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - echo "$SSH_KNOWN_HOSTS" >> ~/.ssh/known_hosts
  script:
    - |
      umask 077
      if [ -f "${STAGING_ENV_FILE:-}" ]; then
        cp "$STAGING_ENV_FILE" deploy/.env
      elif [ -n "${STAGING_ENV_B64:-}" ]; then
        echo "$STAGING_ENV_B64" | base64 -d > deploy/.env
      else
        echo "Set STAGING_ENV_FILE (CI variable type File) or STAGING_ENV_B64 in GitFlic." >&2
        exit 1
      fi
      echo "APP_VERSION=${CI_COMMIT_SHORT_SHA}" >> deploy/.env
      chmod 600 deploy/.env
    - ssh -p "${STAGING_SSH_PORT:-22}" "$STAGING_USER@$STAGING_HOST" "mkdir -p $DEPLOY_PATH/deploy"
    - rsync -avz -e "ssh -p ${STAGING_SSH_PORT:-22}" deploy/ "$STAGING_USER@$STAGING_HOST:$DEPLOY_PATH/deploy/"
    - scp -P "${STAGING_SSH_PORT:-22}" skinemsya-backend.tar.gz "$STAGING_USER@$STAGING_HOST:$DEPLOY_PATH/"
    - |
      ssh -p "${STAGING_SSH_PORT:-22}" "$STAGING_USER@$STAGING_HOST" <<EOSSH
      set -euo pipefail
      chmod 600 "$DEPLOY_PATH/deploy/.env"
      cd "$DEPLOY_PATH"
      gunzip -c skinemsya-backend.tar.gz | docker load
      cd deploy
      APP_VERSION="$CI_COMMIT_SHORT_SHA" docker compose -f docker-compose.prod.yml up -d --remove-orphans
      docker image prune -f
      EOSSH
